<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Healeaf Pharma Console</title>
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts: Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-primary: #07090e;
            --bg-card: rgba(17, 24, 39, 0.55);
            --border-color: rgba(255, 255, 255, 0.08);
            --primary-accent: #10b981; /* Emerald */
            --primary-accent-glow: rgba(16, 185, 129, 0.25);
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Abstract glowing background circles */
        .glowing-bg-circle {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            filter: blur(120px);
            z-index: -1;
            opacity: 0.15;
        }
        .circle-1 {
            background-color: var(--primary-accent);
            top: -100px;
            left: -100px;
        }
        .circle-2 {
            background-color: #3b82f6; /* Blue */
            bottom: -150px;
            right: -100px;
        }

        .login-card {
            background: var(--bg-card);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            max-width: 450px;
            width: 100%;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .card-header-accent {
            text-align: center;
            padding: 40px 30px 20px;
        }

        .brand-icon {
            font-size: 3rem;
            color: var(--primary-accent);
            filter: drop-shadow(0 0 15px var(--primary-accent-glow));
            margin-bottom: 15px;
            animation: pulse 2.5s infinite;
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.05);
                filter: drop-shadow(0 0 25px rgba(16, 185, 129, 0.4));
            }
            100% {
                transform: scale(1);
            }
        }

        .card-body-accent {
            padding: 10px 40px 40px;
        }

        /* Forms in Admin Panel */
        .form-control {
            background-color: rgba(11, 15, 25, 0.8);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            border-radius: 12px;
            padding: 14px 16px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            background-color: rgba(11, 15, 25, 0.95);
            border-color: var(--primary-accent);
            box-shadow: 0 0 0 4px var(--primary-accent-glow);
            color: var(--text-main);
        }
        .form-control::placeholder {
            color: #4b5563;
        }

        .form-label {
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        /* Buttons */
        .btn-accent {
            background: linear-gradient(135deg, var(--primary-accent) 0%, #059669 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            padding: 14px 20px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.25);
            transition: all 0.3s ease;
        }
        .btn-accent:hover {
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(16, 185, 129, 0.4);
        }

        .btn-glass {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 500;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
            margin-top: 20px;
            font-size: 0.85rem;
        }
        .btn-glass:hover {
            background-color: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .alert-glass {
            background-color: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 12px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <!-- Glowing Background blobs -->
    <div class="glowing-bg-circle circle-1"></div>
    <div class="glowing-bg-circle circle-2"></div>

    <div class="login-card">
        <div class="card-header-accent">
            <div class="mb-3">
                <img src="https://content.jdmagicbox.com/comp/delhi/i5/011pxx11.xx11.241029190520.a4i5/logo/healeaf-pharma-pvt-ltd-patparganj-delhi-pharmaceutical-dealers-g3pzvut.jpg" alt="Healeaf Pharma Logo" class="rounded-circle shadow-lg bg-white p-1" style="width: 100px; height: 100px; object-fit: cover; border: 3px solid rgba(16, 185, 129, 0.3);">
            </div>
            <h3 class="mb-1 font-weight-bold">Healeaf Pharma</h3>
            <p class="text-muted small mb-0">Secure Administrative Gateway</p>
        </div>
        
        <div class="card-body-accent">
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-glass alert-dismissible fade show mb-4" role="alert">
                        <i class="fas fa-exclamation-circle me-2"></i> {{ message }}
                        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                {% endfor %}
            {% endif %}
            
            <form method="post">
                {% csrf_token %}
                
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-user-tag me-1"></i> Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter admin username" required autofocus>
                </div>
                
                <div class="mb-4">
                    <label class="form-label"><i class="fas fa-key me-1"></i> Password</label>
                    <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                </div>
                
                <button type="submit" class="btn btn-accent w-100 mt-2">
                    <i class="fas fa-sign-in-alt me-2"></i> Access Panel
                </button>
            </form>
            
            <div class="text-center mt-3">
                <a href="{% url 'home' %}" class="btn-glass">
                    <i class="fas fa-arrow-left me-2"></i> Back to Website
                </a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
