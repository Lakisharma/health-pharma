{% extends 'base.html' %}

{% block title %}Reset Password - Healeaf Pharma{% endblock %}

{% block extra_css %}
<style>
    .reset-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .reset-card {
        border: none;
        border-radius: 24px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.06) !important;
        overflow: hidden;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        background: #ffffff;
    }
    .reset-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 20px 45px rgba(46, 204, 113, 0.12) !important;
    }
    .logo-container {
        text-align: center;
        padding: 40px 30px 20px;
        background: linear-gradient(135deg, rgba(46, 204, 113, 0.05) 0%, rgba(39, 174, 96, 0.01) 100%);
        border-bottom: 1px solid #f1f5f9;
    }
    .logo-image {
        width: 100px;
        height: 100px;
        object-fit: contain;
        transition: all 0.5s ease;
        mix-blend-mode: multiply;
    }
    .reset-card:hover .logo-image {
        transform: scale(1.05) rotate(5deg);
    }
    .form-container {
        padding: 40px 45px 45px;
    }
    .form-control {
        border-radius: 12px;
        border: 2px solid #e2e8f0;
        padding: 14px 16px;
        transition: all 0.3s ease;
        background-color: #f8fafc;
        font-weight: 500;
    }
    .form-control:focus {
        border-color: var(--primary-color);
        box-shadow: 0 0 0 4px rgba(46, 204, 113, 0.15);
        background-color: #ffffff;
    }
    .form-label {
        font-weight: 600;
        color: #1e293b;
        margin-bottom: 8px;
        font-size: 0.9rem;
    }
    .form-label i {
        color: var(--primary-color);
        margin-right: 6px;
    }
    .btn-reset {
        background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
        border: none;
        border-radius: 12px;
        padding: 14px 24px;
        font-weight: 600;
        font-size: 1rem;
        box-shadow: 0 4px 15px rgba(46, 204, 113, 0.25);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        color: white;
    }
    .btn-reset:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 22px rgba(46, 204, 113, 0.35);
        background: linear-gradient(135deg, var(--secondary-color) 0%, #1f8b4c 100%);
        color: white;
    }
</style>
{% endblock %}

{% block content %}
<div class="container py-5 reset-container">
    <div class="row justify-content-center w-100">
        <div class="col-md-6 col-lg-5 col-xl-4 p-0">
            <div class="reset-card shadow-lg">
                <!-- Circular Logo Container -->
                <div class="logo-container">
                    <img src="https://content.jdmagicbox.com/comp/delhi/i5/011pxx11.xx11.241029190520.a4i5/logo/healeaf-pharma-pvt-ltd-patparganj-delhi-pharmaceutical-dealers-g3pzvut.jpg" alt="Healeaf Pharma Logo" class="rounded-circle logo-image">
                    <h3 class="mt-3 font-weight-bold text-dark mb-0">Healeaf Pharma</h3>
                    <p class="text-muted small mb-0 mt-1">Set New Password</p>
                </div>
                
                <div class="form-container">
                    {% if messages %}
                        {% for message in messages %}
                            <div class="alert alert-{{ message.tags }} alert-dismissible fade show mb-4" role="alert">
                                {{ message }}
                                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                            </div>
                        {% endfor %}
                    {% endif %}
                    
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label"><i class="fas fa-lock"></i> New Password</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label"><i class="fas fa-check-double"></i> Confirm Password</label>
                            <input type="password" name="password_confirm" class="form-control" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn btn-reset w-100">
                            <i class="fas fa-save me-2"></i> Update Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
